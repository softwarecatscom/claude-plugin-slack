name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Ruff check
        run: uvx ruff check scripts/slack-poll-daemon.py

      - name: Ruff format
        run: uvx ruff format --check scripts/slack-poll-daemon.py

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts
          ignore_paths: slack
          additional_files: ""

      - name: Check JSON
        run: |
          for f in $(find . -name '*.json' -not -path './.git/*'); do
            python3 -m json.tool "$f" > /dev/null || exit 1
          done

      - name: Check TOML
        run: python3 -c "import tomllib, pathlib; [tomllib.loads(f.read_text()) for f in pathlib.Path('.').rglob('*.toml')]"

      - name: Trailing whitespace
        run: "! grep -rn '[[:space:]]$' scripts/ skills/ --include='*.md' --include='*.py' || exit 1"
