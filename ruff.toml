# Cache
cache-dir = "~/.cache/ruff"

# Exclude commonly ignored directories
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".hg",
    ".mypy_cache",
    ".idea",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
]

# Project-specific exclusions
extend-exclude = [
    "tests",  # Exclude tests from strict linting
]

output-format = "pylint"
line-length = 120
show-fixes = true
src = ["scripts/"]
target-version = "py311"

[format]
docstring-code-format = true
docstring-code-line-length = 120

[lint]
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# Comprehensive rule selection
select = ["A", "ANN", "ARG", "B", "BLE", "C", "COM", "D", "DTZ", "E", "EM", "ERA", "EXE", "F", "G", "I", "ICN", "INP", "ISC", "N", "PD", "PGH", "PIE", "PL", "PT", "PTH", "Q", "RET", "RUF", "S", "SIM", "T", "TCH", "TID", "UP", "W", "YTT"]

fixable = ["A", "ANN", "ARG", "B", "BLE", "C", "COM", "D", "DTZ", "E", "EM", "ERA", "EXE", "F", "G", "I", "ICN", "INP", "ISC", "N", "PD", "PGH", "PIE", "PL", "PT", "PTH", "Q", "RET", "RUF", "S", "SIM", "T", "TCH", "TID", "UP", "W", "YTT"]

ignore = [
    # From SandsB2B (battle-tested)
    "ANN002",   # Missing type annotation for *args
    "ANN003",   # Missing type annotation for **kwargs
    "D211",     # No blank line before class docstring (conflicts with D203)
    "D212",     # Multi-line docstring start (conflicts with D213)
    "D213",     # Multi-line docstring summary second line
    "D203",     # One blank line before class docstring (conflicts with D211)
    "S101",     # Assert usage (fine in non-test code for this project)
    "T20",      # Print statements (needed for CLI tools)
    "EM101",    # Exception string literal
    "EM102",    # Exception f-string
    "ERA001",   # Commented-out code (sometimes useful)
    "E501",     # Line too long (formatter handles this)
    "COM812",   # Trailing comma (can conflict with formatter)
    "BLE001",   # Blind except (sometimes needed)
    "RET504",   # Unnecessary assignment before return
    "D417",     # Missing argument description
    "PLC0415",  # Import outside top-level
    "D200",     # One-line docstring should fit on one line
    "D202",     # No blank lines after docstring
    "D407",     # Missing dashed underline after section
    "D413",     # Missing blank line after last section
    "A004",     # Import shadowing builtin
    "SIM910",   # Use dict.get
    "B009",     # Do not call getattr with constant
#    "UP038",    # Use X | Y for isinstance
    "UP042",    # Module level import not at top of file
    "N999",     # Invalid module name

    # From current selfpub-wizard config (keep these)
    "ANN001",   # Missing type annotation for function argument
    "ANN201",   # Missing return type annotation for public function
    "ANN202",   # Missing return type annotation for private function
    "ANN204",   # Missing return type annotation for special method
    "D100",     # Missing docstring in public module
    "D101",     # Missing docstring in public class
    "D102",     # Missing docstring in public method
    "D103",     # Missing docstring in public function
    "D104",     # Missing docstring in public package
    "D107",     # Missing docstring in __init__
    "D400",     # First line should end with a period
    "D415",     # First line should end with period/question/exclamation
]

task-tags = ["TODO", "FIXME"]
unfixable = []

[lint.flake8-annotations]
allow-star-arg-any = true

[lint.mccabe]
max-complexity = 10

[lint.pylint]
max-args = 10
