fail_fast: false
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [ "--fix=lf" ]
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: scripts/
        exclude: (\.py$|^scripts/slack$)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff-check
        args:
        - --fix
        files: scripts/.*\.py$
        exclude: ^scripts/(slack-heartbeat|slack-mention-tracker)\.py$
      - id: ruff-format
        files: scripts/.*\.py$
        exclude: ^scripts/(slack-heartbeat|slack-mention-tracker)\.py$
